<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar8 — WOOTANGULAR369</title>
  <link rel="icon" href="/static/android-chrome-512x512.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: #0a0a0a;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      z-index: 10;
    }
    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #2a2a2a;
    }
    .header-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #e8e8e8;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.16em;
      color: #444;
      text-transform: uppercase;
      margin-top: 1px;
    }

    #feed {
      position: fixed;
      top: 64px;
      bottom: 72px;
      left: 0; right: 0;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #feed.with-chip { bottom: 112px; }

    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .bot-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
      margin-top: 2px;
    }

    .msg {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.55;
      word-wrap: break-word;
    }
    .msg.user {
      background: #1a1a2e;
      border-bottom-right-radius: 4px;
      color: #c8d8ff;
      white-space: pre-wrap;
    }
    .msg.bot {
      background: #141414;
      border: 1px solid #222;
      border-bottom-left-radius: 4px;
      color: #e8e8e8;
    }
    .msg.thinking {
      color: #555;
      font-style: italic;
      white-space: pre-wrap;
    }

    .msg-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }
    .tts-btn {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #555;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 7px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tts-btn:hover { color: #a0b4ff; border-color: #3a3a5c; }
    .tts-btn:disabled { opacity: 0.4; cursor: default; }

    .code-wrapper { position: relative; margin: 8px 0; }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111;
      border: 1px solid #2a2a2a;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 4px 10px;
    }
    .code-lang {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #555;
    }
    .code-btns { display: flex; gap: 6px; }
    .code-btn {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      padding: 2px 8px;
      transition: color 0.15s, border-color 0.15s;
    }
    .code-btn:hover { color: #a0b4ff; border-color: #3a3a5c; }
    pre {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-left: 2px solid #3a3a5c;
      border-radius: 0 0 6px 6px;
      overflow-x: auto;
      padding: 12px 14px;
    }
    pre code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #c8d8ff;
      white-space: pre;
    }

    #chip-bar {
      position: fixed;
      bottom: 72px;
      left: 0; right: 0;
      height: 40px;
      background: #0a0a0a;
      border-top: 1px solid #1e1e1e;
      display: none;
      align-items: center;
      padding: 0 16px;
    }
    #chip-bar.visible { display: flex; }
    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 20px;
      color: #a0b4ff;
      font-size: 12px;
      padding: 3px 10px;
    }
    .chip-remove {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }
    .chip-remove:hover { color: #ff6b6b; }

    #input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      background: #0a0a0a;
      border-top: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }
    .paperclip-btn {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #555;
      cursor: pointer;
      font-size: 18px;
      height: 44px;
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .paperclip-btn:hover { color: #a0b4ff; border-color: #3a3a5c; }
    #msg-input {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e8e8e8;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      height: 44px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #3a3a5c; }
    #send-btn {
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 10px;
      color: #a0b4ff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 0 18px;
      height: 44px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #24245a; color: #c8d8ff; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    .stream-cursor::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      color: #3a3a5c;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <header>
    <img class="header-avatar" src="/static/android-chrome-512x512.png" alt="Solar8" />
    <div class="header-text">
      <span class="header-title">Solar8</span>
      <span class="header-sub">WOOTANGULAR369</span>
    </div>
  </header>

  <div id="feed"></div>

  <div id="chip-bar">
    <div class="file-chip">
      <span id="chip-name"></span>
      <button class="chip-remove" id="chip-remove" title="Remove file">✕</button>
    </div>
  </div>

  <div id="input-bar">
    <button class="paperclip-btn" id="paperclip-btn" title="Attach file">📎</button>
    <input type="file" id="file-input" accept="image/*,.pdf,.txt,.py,.js,.ts,.md,.json,.csv,.html,.css" style="display:none" />
    <textarea id="msg-input" placeholder="Say something…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const feed       = document.getElementById('feed');
    const input      = document.getElementById('msg-input');
    const sendBtn    = document.getElementById('send-btn');
    const paperclip  = document.getElementById('paperclip-btn');
    const fileInput  = document.getElementById('file-input');
    const chipBar    = document.getElementById('chip-bar');
    const chipName   = document.getElementById('chip-name');
    const chipRemove = document.getElementById('chip-remove');

    let history = [];
    let attachedFile = null;

    paperclip.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const f = fileInput.files[0];
      if (!f) return;
      const isText = /\.(txt|py|js|ts|md|json|csv|html|css)$/i.test(f.name) ||
        ['text/plain','text/x-python','application/javascript','text/javascript',
         'text/markdown','application/json','text/csv','text/html','text/css'].includes(f.type);

      const reader = new FileReader();
      reader.onload = (e) => {
        const data = e.target.result;
        if (isText) {
          attachedFile = { name: f.name, mime_type: f.type || 'text/plain', data, is_text: true };
        } else {
          attachedFile = { name: f.name, mime_type: f.type, data: (data.split(',')[1] || data), is_text: false };
        }
        chipName.textContent = f.name;
        chipBar.classList.add('visible');
        feed.classList.add('with-chip');
      };
      isText ? reader.readAsText(f) : reader.readAsDataURL(f);
      fileInput.value = '';
    });

    chipRemove.addEventListener('click', clearAttachment);
    function clearAttachment() {
      attachedFile = null;
      chipBar.classList.remove('visible');
      feed.classList.remove('with-chip');
    }

    const LANG_EXT = {
      python:'py', py:'py', javascript:'js', js:'js', typescript:'ts', ts:'ts',
      html:'html', css:'css', json:'json', markdown:'md', md:'md', bash:'sh',
      sh:'sh', sql:'sql', java:'java', c:'c', cpp:'cpp', go:'go', rust:'rs',
      ruby:'rb', php:'php', yaml:'yaml', toml:'toml',
    };

    function renderBotContent(text) {
      const parts = text.split(/(```[\s\S]*?```)/g);
      const frag = document.createDocumentFragment();
      parts.forEach(part => {
        const m = part.match(/^```(\w*)\n?([\s\S]*?)```$/);
        if (m) {
          const lang = m[1].toLowerCase();
          const code = m[2];
          const ext  = LANG_EXT[lang] || (lang || null);

          const wrapper = document.createElement('div');
          wrapper.className = 'code-wrapper';

          const hdr = document.createElement('div');
          hdr.className = 'code-header';
          const lbl = document.createElement('span');
          lbl.className = 'code-lang';
          lbl.textContent = lang || 'code';
          hdr.appendChild(lbl);

          const btns = document.createElement('div');
          btns.className = 'code-btns';

          const copyBtn = document.createElement('button');
          copyBtn.className = 'code-btn';
          copyBtn.textContent = 'Copy';
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(code).then(() => {
              copyBtn.textContent = 'Copied!';
              setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
            });
          };
          btns.appendChild(copyBtn);

          if (ext) {
            const dlBtn = document.createElement('button');
            dlBtn.className = 'code-btn';
            dlBtn.textContent = 'Download';
            dlBtn.onclick = () => {
              const a = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(new Blob([code], { type: 'text/plain' })) ,
                download: `solar8_output.${ext}`
              });
              a.click();
            };
            btns.appendChild(dlBtn);
          }

          hdr.appendChild(btns);
          wrapper.appendChild(hdr);

          const pre = document.createElement('pre');
          const codeEl = document.createElement('code');
          codeEl.textContent = code;
          pre.appendChild(codeEl);
          wrapper.appendChild(pre);
          frag.appendChild(wrapper);
        } else if (part) {
          const span = document.createElement('span');
          span.style.whiteSpace = 'pre-wrap';
          span.textContent = part;
          frag.appendChild(span);
        }
      });
      return frag;
    }

    function addUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'msg-row user';
      const bubble = document.createElement('div');
      bubble.className = 'msg user';
      bubble.textContent = text;
      row.appendChild(bubble);
      feed.appendChild(row);
      feed.scrollTop = feed.scrollHeight;
    }

    function addThinking(text) {
      const row = document.createElement('div');
      row.className = 'msg-row';
      const avatar = document.createElement('img');
      avatar.className = 'bot-avatar';
      avatar.src = '/static/android-chrome-512x512.png';
      avatar.alt = 'Solar8';
      row.appendChild(avatar);
      const bubble = document.createElement('div');
      bubble.className = 'msg bot thinking';
      bubble.textContent = text || '🔍 Solar8 is thinking…';
      row.appendChild(bubble);
      feed.appendChild(row);
      feed.scrollTop = feed.scrollHeight;
      return row;
    }

    function addBotMessage(text) {
      const row = document.createElement('div');
      row.className = 'msg-row';
      const avatar = document.createElement('img');
      avatar.className = 'bot-avatar';
      avatar.src = '/static/android-chrome-512x512.png';
      avatar.alt = 'Solar8';
      row.appendChild(avatar);
      const bubble = document.createElement('div');
      bubble.className = 'msg bot';
      bubble.appendChild(renderBotContent(text));

      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      const ttsBtn = document.createElement('button');
      ttsBtn.className = 'tts-btn';
      ttsBtn.title = 'Read aloud';
      ttsBtn.textContent = '🔊';
      ttsBtn.onclick = () => playTTS(text, ttsBtn);
      actions.appendChild(ttsBtn);
      bubble.appendChild(actions);

      row.appendChild(bubble);
      feed.appendChild(row);
      feed.scrollTop = feed.scrollHeight;
      return row;
    }

    async function playTTS(text, btn) {
      btn.disabled = true;
      btn.textContent = '⏳';
      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        if (data.status === 'ok' && data.audio_base64) {
          const audio = new Audio(`data:${data.mime_type};base64,${data.audio_base64}`);
          audio.play();
          audio.onended = () => { btn.textContent = '🔊'; btn.disabled = false; };
          audio.onerror = () => { btn.textContent = '🔊'; btn.disabled = false; };
        } else {
          btn.textContent = '🔊'; btn.disabled = false;
        }
      } catch {
        btn.textContent = '🔊'; btn.disabled = false;
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      input.value = '';
      sendBtn.disabled = true;

      addUserMessage(text);
      const thinkingRow = addThinking('🔍 Solar8 is thinking…');

      const msgHistory = [...history];
      history.push({ role: 'user', content: text });

      const body = { message: text, history: msgHistory };
      if (attachedFile) { body.file = attachedFile; clearAttachment(); }

      let fullReply = '';

      try {
        const streamRes = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (streamRes.ok && streamRes.headers.get('content-type')?.includes('text/event-stream')) {
          thinkingRow.remove();

          const row = document.createElement('div');
          row.className = 'msg-row';
          const avatar = document.createElement('img');
          avatar.className = 'bot-avatar';
          avatar.src = '/static/android-chrome-512x512.png';
          avatar.alt = 'Solar8';
          row.appendChild(avatar);
          const bubble = document.createElement('div');
          bubble.className = 'msg bot stream-cursor';
          const textSpan = document.createElement('span');
          textSpan.style.whiteSpace = 'pre-wrap';
          bubble.appendChild(textSpan);
          row.appendChild(bubble);
          feed.appendChild(row);

          const reader = streamRes.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const chunk = line.slice(6);
              if (chunk === '[DONE]') {
                bubble.classList.remove('stream-cursor');
                bubble.innerHTML = '';
                bubble.appendChild(renderBotContent(fullReply));
                const actions = document.createElement('div');
                actions.className = 'msg-actions';
                const ttsBtn = document.createElement('button');
                ttsBtn.className = 'tts-btn';
                ttsBtn.title = 'Read aloud';
                ttsBtn.textContent = '🔊';
                ttsBtn.onclick = () => playTTS(fullReply, ttsBtn);
                actions.appendChild(ttsBtn);
                bubble.appendChild(actions);
                history.push({ role: 'assistant', content: fullReply });
                break;
              }
              if (chunk.startsWith('[ERROR]')) {
                bubble.classList.remove('stream-cursor');
                textSpan.textContent = 'Solar8 hit an error. Try again.';
                history.pop();
                break;
              }
              fullReply += chunk;
              textSpan.textContent = fullReply;
              feed.scrollTop = feed.scrollHeight;
            }
          }

        } else {
          const data = await streamRes.json();
          thinkingRow.remove();
          const reply = data.response || data.message || 'No response.';
          addBotMessage(reply);
          history.push({ role: 'assistant', content: reply });
        }

      } catch (err) {
        try { thinkingRow.remove(); } catch {}
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          const reply = data.response || data.message || 'No response.';
          addBotMessage(reply);
          history.push({ role: 'assistant', content: reply });
        } catch (err2) {
          addThinking('Error reaching Solar8. Try again.');
          history.pop();
        }

      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
