<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar8 — WOOTANGULAR369</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #0a0a0a;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 10;
    }
    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #e8e8e8;
    }
    .header-sub {
      margin-left: 10px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: #555;
      text-transform: uppercase;
      align-self: flex-end;
      padding-bottom: 3px;
    }

    /* ── Feed ── */
    #feed {
      position: fixed;
      top: 56px;
      bottom: 72px;
      left: 0; right: 0;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* ── Messages ── */
    .msg {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a1a2e;
      border-bottom-right-radius: 4px;
      color: #c8d8ff;
    }
    .msg.bot {
      align-self: flex-start;
      background: #141414;
      border: 1px solid #222;
      border-bottom-left-radius: 4px;
      color: #e8e8e8;
    }
    .msg.thinking {
      color: #555;
      font-style: italic;
    }

    /* ── Input bar ── */
    #input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      background: #0a0a0a;
      border-top: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }
    #msg-input {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e8e8e8;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      height: 44px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    #msg-input:focus {
      border-color: #3a3a5c;
    }
    #send-btn {
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 10px;
      color: #a0b4ff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 0 18px;
      height: 44px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover {
      background: #24245a;
      color: #c8d8ff;
    }
    #send-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
  </style>
</head>
<body>

  <header>
    <span class="header-title">Solar8</span>
    <span class="header-sub">WOOTANGULAR369</span>
  </header>

  <div id="feed"></div>

  <div id="input-bar">
    <textarea id="msg-input" placeholder="Say something…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const feed    = document.getElementById('feed');
    const input   = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');

    let history = [];

    function addMessage(text, role) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      feed.appendChild(el);
      feed.scrollTop = feed.scrollHeight;
      return el;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      sendBtn.disabled = true;

      addMessage(text, 'user');

      const thinking = addMessage('Solar8 is thinking…', 'bot thinking');

      history.push({ role: 'user', content: text });

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(0, -1) })
        });
        const data = await res.json();
        const reply = data.response || data.message || 'No response.';
        thinking.remove();
        addMessage(reply, 'bot');
        history.push({ role: 'assistant', content: reply });
      } catch (err) {
        thinking.remove();
        addMessage('Error reaching Solar8. Try again.', 'bot thinking');
        history.pop();
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
